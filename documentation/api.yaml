openapi: 3.0.3
info:
  title: Multi-Tenant RAG System API
  version: 1.0.0
  description: |
    Production-ready Retrieval-Augmented Generation (RAG) system with strict multi-tenant isolation.

servers:
  - url: http://localhost:3000
    description: Local

tags:
  - name: Health
  - name: Tenant
  - name: Documents
  - name: Query

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Checks service health for database, Qdrant, and Redis.
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more services unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/tenant:
    post:
      tags: [Tenant]
      summary: Create tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
            examples:
              example:
                value:
                  name: Acme Inc
                  email: admin@acme.com
                  password: "secret123"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponseEnvelope"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Tenant already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/tenant/login:
    post:
      tags: [Tenant]
      summary: Tenant login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantLoginRequest"
            examples:
              example:
                value:
                  email: admin@acme.com
                  password: "secret123"
      responses:
        "200":
          description: Tenant logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantLoginResponseEnvelope"
        "400":
          description: Invalid credentials / validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/tenant/{tenantId}:
    get:
      tags: [Tenant]
      summary: Fetch tenant
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchTenantResponseEnvelope"
        "401":
          description: Authorization token is required / authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Invalid tenant access / invalid tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/tenant/refresh-token:
    post:
      tags: [Tenant]
      summary: Refresh auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
            examples:
              example:
                value:
                  refreshToken: "<refresh token>"
      responses:
        "200":
          description: Auth token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshAuthTokenResponseEnvelope"
        "400":
          description: Refresh token missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/{tenantId}/documents:
    post:
      tags: [Documents]
      summary: Upload a document
      description: |
        Upload a PDF or TXT file for a tenant. Processing starts asynchronously.
        The uploaded form field name must be `file`.
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                metadata:
                  description: JSON string (parsed server-side)
                  type: string
              required: [file]
      responses:
        "202":
          description: Document uploaded and processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentResponseEnvelope"
        "400":
          description: No file uploaded / invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization token is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Invalid tenant access / invalid tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: File too large (max 10MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    get:
      tags: [Documents]
      summary: List documents
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: Documents fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchDocumentsResponseEnvelope"
        "401":
          description: Authorization token is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Invalid tenant access / invalid tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/{tenantId}/documents/{documentId}:
    delete:
      tags: [Documents]
      summary: Delete (soft-delete) a document
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          description: Authorization token is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Invalid tenant access / invalid tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/{tenantId}/query:
    post:
      tags: [Query]
      summary: Process a query (RAG)
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessQueryRequest"
            examples:
              example:
                value:
                  query: What is our refund policy?
                  topK: 5
                  minConfidence: 0.7
      responses:
        "200":
          description: Query processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessQueryResponseEnvelope"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization token is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Invalid tenant access / invalid tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Generic envelopes used across the API
    SuccessEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          nullable: true
      required: [success, message]

    ErrorEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        error:
          nullable: true
      required: [success, message]

    # Used by the global error handler for 413 (LIMIT_FILE_SIZE)
    RawError:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
      required: [error]

    CreateTenantRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 14
      required: [name, email, password]

    TenantLoginRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 14
      required: [email, password]

    TenantStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]

    CreateTenantResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
              format: email
            status:
              $ref: "#/components/schemas/TenantStatus"
            authToken:
              type: string
            refreshToken:
              type: string
          required: [id, name, email, status, authToken, refreshToken]
      required: [success, message, data]

    TenantLoginResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
              format: email
            status:
              $ref: "#/components/schemas/TenantStatus"
            authToken:
              type: string
            refreshToken:
              type: string
          required: [id, name, email, status, authToken, refreshToken]
      required: [success, message, data]

    FetchTenantResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
              format: email
            status:
              $ref: "#/components/schemas/TenantStatus"
            createdAt:
              type: string
              format: date-time
            documentCount:
              type: integer
              minimum: 0
            queryCount:
              type: integer
              minimum: 0
          required: [id, name, email, status, createdAt, documentCount, queryCount]
      required: [success, message, data]

    RefreshTokenRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
          minLength: 1
      required: [refreshToken]

    RefreshAuthTokenResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: false
          properties:
            authToken:
              type: string
          required: [authToken]
      required: [success, message, data]

    DocumentStatus:
      type: string
      enum: [PROCESSING, COMPLETED, FAILED, DELETED]

    UploadDocumentResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            filename:
              type: string
            status:
              $ref: "#/components/schemas/DocumentStatus"
          required: [id, filename, status]
      required: [success, message, data]

    DocumentListItem:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        filename:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        status:
          $ref: "#/components/schemas/DocumentStatus"
        chunkCount:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, filename, fileSize, mimeType, status, chunkCount, uploadedAt, processedAt]

    FetchDocumentsResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: false
          properties:
            documents:
              type: array
              items:
                $ref: "#/components/schemas/DocumentListItem"
            total:
              type: integer
              minimum: 0
            page:
              type: integer
              minimum: 1
            limit:
              type: integer
              minimum: 1
          required: [documents, total, page, limit]
      required: [success, message, data]

    ProcessQueryRequest:
      type: object
      additionalProperties: false
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
        topK:
          type: number
          minimum: 1
          maximum: 10
        minConfidence:
          type: number
          minimum: 0
          maximum: 1
      required: [query]

    SourceDocument:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        content:
          type: string
        filename:
          type: string
        score:
          type: number
        metadata:
          type: object
          additionalProperties: true
      required: [id, content, filename, score, metadata]

    QueryResponse:
      type: object
      additionalProperties: false
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceDocument"
        confidence:
          type: number
        guardrailTriggered:
          type: boolean
      required: [answer, sources, confidence, guardrailTriggered]

    ProcessQueryResponseEnvelope:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/QueryResponse"
      required: [success, message, data]

    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          additionalProperties: false
          properties:
            database:
              type: string
              enum: [up, down, unknown]
            qdrant:
              type: string
              enum: [up, down, unknown]
            redis:
              type: string
              enum: [up, down, unknown]
          required: [database, qdrant, redis]
      required: [status, timestamp, services]